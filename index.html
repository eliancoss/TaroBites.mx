<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Tarobites</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1a472a;
      --lime:  #a8c96e;
      --cream: #f5f0e8;
      --dark:  #111;
    }
    body {
      min-height: 100vh;
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: var(--lime);
      filter: blur(100px);
      opacity: .15;
      top: -150px; left: -150px;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: #ee2a7b;
      filter: blur(100px);
      opacity: .1;
      bottom: -100px; right: -100px;
      z-index: 0;
    }

    .card {
      background: #fff;
      border-radius: 28px;
      padding: 48px 40px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 12px 60px rgba(0,0,0,.1);
      position: relative; z-index: 1;
      animation: fadeUp .6s ease both;
      max-width: 340px;
      width: 100%;
    }

    .logo-pill {
      background: var(--green);
      color: var(--lime);
      font-family: 'Playfair Display', serif;
      font-size: 12px;
      letter-spacing: .2em;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 100px;
      margin-bottom: 18px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--dark);
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -.02em;
    }

    .subtitle {
      font-size: .85rem;
      color: #888;
      font-weight: 300;
      margin-bottom: 32px;
      text-align: center;
    }

    .qr-wrap {
      background: var(--cream);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 28px;
    }

    .qr-wrap canvas, .qr-wrap img {
      display: block;
      border-radius: 10px;
    }

    .icons-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .icon-badge {
      width: 40px; height: 40px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-badge svg { width: 20px; height: 20px; fill: white; }
    .icon-badge.wa { background: #25D366; }
    .icon-badge.ig { background: linear-gradient(135deg,#f9ce34,#ee2a7b,#6228d7); }
    .sep {
      font-size: 1.1rem;
      color: #ccc;
    }

    .dl-btn {
      background: var(--green);
      color: var(--lime);
      border: none;
      border-radius: 100px;
      padding: 13px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .2s, transform .2s;
      display: flex; align-items: center; gap: 8px;
    }
    .dl-btn:hover { opacity: .85; transform: scale(.97); }

    .url-tag {
      margin-top: 18px;
      font-size: .72rem;
      color: #bbb;
      letter-spacing: .04em;
      word-break: break-all;
      text-align: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-pill">tarobites.mx</div>
  <h1>Escanéame</h1>
  <p class="subtitle">Te lleva a WhatsApp e Instagram</p>

  <div class="qr-wrap">
    <div id="qr"></div>
  </div>

  <div class="icons-row">
    <div class="icon-badge wa">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </div>
    <span class="sep">+</span>
    <div class="icon-badge ig">
      <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
    </div>
  </div>

  <button class="dl-btn" onclick="downloadQR()">⬇ Descargar QR</button>
  <p class="url-tag">eliancoss.github.io/TaroBites.mx</p>
</div>

<script>
  new QRCode(document.getElementById("qr"), {
    text: "https://eliancoss.github.io/TaroBites.mx/",
    width: 220,
    height: 220,
    colorDark: "#1a472a",
    colorLight: "#f5f0e8",
    correctLevel: QRCode.CorrectLevel.H
  });

  function downloadQR() {
    const canvas = document.querySelector('#qr canvas');
    if (!canvas) return;
    const link = document.createElement('a');
    link.download = 'qr-tarobites.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
</script>
</body>
</html>
