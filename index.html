<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tarobites — Contacto</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #1a472a;
      --lime:   #a8c96e;
      --cream:  #f5f0e8;
      --dark:   #111;
      --wa:     #25D366;
      --ig-start: #f9ce34;
      --ig-mid:  #ee2a7b;
      --ig-end:  #6228d7;
    }

    body {
      min-height: 100vh;
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 64px;
      position: relative;
      overflow-x: hidden;
    }

    /* Decorative blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .18;
      z-index: 0;
    }
    body::before {
      width: 420px; height: 420px;
      background: var(--lime);
      top: -100px; left: -120px;
    }
    body::after {
      width: 360px; height: 360px;
      background: #ee2a7b;
      bottom: -80px; right: -100px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
      position: relative; z-index: 1;
      animation: fadeUp .7s ease both;
    }

    .logo-pill {
      display: inline-block;
      background: var(--green);
      color: var(--lime);
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      letter-spacing: .2em;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 100px;
      margin-bottom: 16px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 3.8rem);
      color: var(--dark);
      line-height: 1.05;
      letter-spacing: -.02em;
    }

    header p {
      margin-top: 12px;
      color: #555;
      font-size: 1rem;
      font-weight: 300;
    }

    .cards {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
      position: relative; z-index: 1;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 36px 32px 28px;
      width: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 8px 40px rgba(0,0,0,.08);
      transition: transform .3s ease, box-shadow .3s ease;
      animation: fadeUp .7s ease both;
    }
    .card:nth-child(2) { animation-delay: .12s; }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 56px rgba(0,0,0,.13);
    }

    .card-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }
    .card-icon svg { width: 28px; height: 28px; fill: #fff; }

    .card-icon.wa  { background: var(--wa); }
    .card-icon.ig  { background: linear-gradient(135deg, var(--ig-start), var(--ig-mid), var(--ig-end)); }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--dark);
      margin-bottom: 4px;
    }

    .card .handle {
      font-size: .82rem;
      color: #888;
      margin-bottom: 24px;
      letter-spacing: .03em;
    }

    .qr-wrap {
      background: var(--cream);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .qr-wrap canvas, .qr-wrap img {
      display: block;
      border-radius: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      font-weight: 500;
      text-decoration: none;
      transition: opacity .2s, transform .2s;
      cursor: pointer;
      border: none;
      color: #fff;
    }
    .btn:hover { opacity: .88; transform: scale(.97); }
    .btn.wa  { background: var(--wa); }
    .btn.ig  { background: linear-gradient(135deg, var(--ig-start), var(--ig-mid), var(--ig-end)); }

    footer {
      margin-top: 64px;
      color: #aaa;
      font-size: .78rem;
      letter-spacing: .05em;
      text-transform: uppercase;
      position: relative; z-index: 1;
      animation: fadeUp .7s .3s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Download button */
    .dl-btn {
      margin-top: 14px;
      background: none;
      border: 1.5px solid #ddd;
      border-radius: 100px;
      padding: 8px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: .78rem;
      color: #777;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      display: flex; align-items: center; gap: 6px;
    }
    .dl-btn:hover { border-color: #999; color: #333; }
  </style>
</head>
<body>

<script>
  // WhatsApp QR
  new QRCode(document.getElementById("qr-wa"), {
    text: "https://wa.me/528444999651",
    width: 180,
    height: 180,
    colorDark: "#1a472a",
    colorLight: "#f5f0e8",
    correctLevel: QRCode.CorrectLevel.H
  });

  // Instagram QR
  new QRCode(document.getElementById("qr-ig"), {
    text: "https://instagram.com/tarobites.mx",
    width: 180,
    height: 180,
    colorDark: "#6228d7",
    colorLight: "#f5f0e8",
    correctLevel: QRCode.CorrectLevel.H
  });

  function downloadQR(containerId, filename) {
    const container = document.getElementById(containerId);
    const canvas = container.querySelector('canvas');
    if (!canvas) return;
    const link = document.createElement('a');
    link.download = filename + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
</script>
